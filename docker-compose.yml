version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sms-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/studentdb
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your_super_secret_key_change_this_in_production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - APP_NAME=Student Management System
      - DEBUG=True
    depends_on:
      - db
      - redis
    networks:
      - sms-network

  db:
    image: postgres:15-alpine
    container_name: sms-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=studentdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sms-network

  redis:
    image: redis:7-alpine
    container_name: sms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sms-network

networks:
  sms-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
